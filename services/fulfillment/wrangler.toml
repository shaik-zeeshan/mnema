name = "mnema-fulfillment"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Idempotency store, deduped on the Polar order id.
# Create with: wrangler kv namespace create IDEMPOTENCY  (paste the returned id below)
[[kv_namespaces]]
binding = "IDEMPOTENCY"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
UPDATE_WINDOW_DAYS = "365"
# Non-secret config — fill in your Polar product ids (safe to commit if you wish, but left as placeholders):
# POLAR_LICENSE_PRODUCT_ID = "prod_..."
# POLAR_RENEWAL_PRODUCT_ID = "prod_..."
# RESEND_FROM = "Mnema Licenses <licenses@mnema.app>"

# Secrets — set via `wrangler secret put <NAME>` (NEVER commit values):
#   ED25519_PRIVATE_KEY    base64 of the raw 32-byte Ed25519 seed
#   POLAR_WEBHOOK_SECRET   Polar webhook signing secret (whsec_<base64>)
#   RESEND_API_KEY         Resend API key
# Product ids may also be set as secrets instead of [vars] if you prefer.
