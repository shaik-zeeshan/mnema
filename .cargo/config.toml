# The licensegate client dep lives in a PRIVATE GitHub repo; cargo's built-in
# libgit2 fetch has no credentials, but the system git does.
[net]
git-fetch-with-cli = true

[env]
MACOSX_DEPLOYMENT_TARGET = { value = "11.0", force = true }
CMAKE_OSX_DEPLOYMENT_TARGET = { value = "11.0", force = true }
