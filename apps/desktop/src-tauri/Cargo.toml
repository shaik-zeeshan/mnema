[package]
name = "mnema"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "mnema_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
cargo-clippy = []

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
base64 = "0.22"
tauri = { version = "2", features = ["protocol-asset", "macos-private-api"] }
tauri-plugin-clipboard-manager = "2"
tauri-plugin-fs = "2"
tauri-plugin-opener = "2"
tauri-plugin-log = "2"
fs2 = "0.4"
futures-util = "0.3"
reqwest = { version = "0.12", features = ["stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
app-infra = { path = "../../../crates/app-infra" }
audio-transcription = { path = "../../../crates/audio-transcription", features = ["local-whisper", "parakeet-onnx"] }
capture-types = { path = "../../../crates/capture-types" }
capture-runtime = { path = "../../../crates/capture-runtime" }
capture-screen = { path = "../../../crates/capture-screen" }
capture-microphone = { path = "../../../crates/capture-microphone" }
capture-vad = { path = "../../../crates/capture-vad" }
capture-writers = { path = "../../../crates/capture-writers" }
tokio = { version = "1", features = ["sync", "time"] }
time = { version = "0.3", features = ["formatting", "parsing"] }
tempfile = "3"

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.26"
core-graphics = "0.25"
cidre = { version = "0.15", default-features = false, features = ["app", "async", "av", "blocks", "cf", "cg", "cm", "iio", "ns", "ut", "macos_15_0"] }
objc = "0.2"
