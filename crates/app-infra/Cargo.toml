[package]
name = "app-infra"
version = "0.1.0"
edition = "2021"

[dependencies]
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls", "migrate"] }
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread"] }
