name: Type Check

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: type-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Full repo type check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --locked
