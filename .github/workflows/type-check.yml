name: Type Check

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: type-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Full repo type check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      # speakrs links OpenBLAS via the `openblas-static` feature: openblas-src
      # builds OpenBLAS (incl. Fortran LAPACK) from source during `cargo check`,
      # and the desktop build.rs force-links the static gfortran/quadmath runtime.
      # Both need a Fortran toolchain at build time, and OpenBLAS's `make all`
      # links its test programs with `-lgfortran`, so the gcc lib dir must be on
      # the linker search path (LIBRARY_PATH).
      - name: Install Fortran toolchain (gcc/gfortran)
        run: |
          set -euo pipefail
          brew install gcc
          gfdir="$(dirname "$(gfortran -print-file-name=libgfortran.dylib)")"
          echo "LIBRARY_PATH=${gfdir}${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Prepare Mnema CLI sidecar
        run: ./scripts/prepare-mnema-cli-sidecar.sh debug --locked

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --locked

      - name: Run semantic-search descriptor drift guard
        run: cargo test -p semantic-search --locked
