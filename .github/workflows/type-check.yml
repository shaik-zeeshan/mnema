name: Type Check

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: type-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Full repo type check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Prepare Mnema CLI sidecar
        run: bun scripts/prepare-mnema-cli-sidecar.mjs debug --locked

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --locked

  windows-check:
    name: Windows compile check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Mnema CLI sidecar
        # Compiles and *links* `mnema-cli`, which exercises the Windows SQLCipher
        # build end to end: `libsqlite3-sys` (bundled-sqlcipher-vendored-openssl
        # on Windows) builds OpenSSL from source via `openssl-src` using the
        # runner's pre-installed Perl + NASM + MSVC, then links libcrypto
        # statically. No system OpenSSL or OPENSSL_DIR is required. This stages a
        # real sidecar for the Tauri externalBin resource instead of a placeholder.
        run: bun scripts/prepare-mnema-cli-sidecar.mjs debug --locked

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --locked

      - name: Build desktop crate (exercises ML native link)
        # `cargo check` above type-checks the workspace but never *links* the
        # heavy native ML runtimes. The desktop `mnema` crate enables the
        # `audio-transcription` (local-whisper + parakeet-onnx/ort),
        # `speaker-analysis` (sherpa-onnx), and Windows `ocr`/`media-decode`
        # features, so building its lib forces the real Windows link of
        # onnxruntime (ort), sherpa-onnx, and whisper.cpp. Scoped to `--lib`
        # (no Tauri bundle / no frontend dist) to keep CI time bounded while
        # still validating that the native ML link succeeds on Windows.
        # NOT covered here: producing the packaged NSIS/MSI bundle.
        run: cargo build -p mnema --lib --locked

      - name: Test platform-neutral crates
        run: >
          cargo test --locked
          -p capture-runtime
          -p capture-types
          -p capture-vad
          -p secret-redaction
          -p capture-metadata

      - name: Test Windows capture crates
        # These crates carry the #[cfg(target_os = "windows")] runtime tests for
        # the Windows recording pipeline: capture-writers (F02 AAC sink
        # zero-sample finalize guard via a real IMFSinkWriter round-trip),
        # capture-screen + media-decode (F07 past-EOS frame extraction, F16 RGB32
        # stride/flip, the MF Source Reader decode round-trips), and
        # capture-microphone (MF format/HRESULT classification). They pull only
        # the in-box Windows media stack (MF / WGC / WASAPI) — no ML native
        # runtimes, no capture device or display — so they run headlessly on the
        # GitHub runner. `cargo check --all-targets` above only type-checks these
        # tests; this step actually executes them.
        run: >
          cargo test --locked
          -p capture-writers
          -p capture-microphone
          -p capture-screen
          -p media-decode

      - name: Test Windows desktop-crate pipeline logic
        # The mnema desktop crate (apps/desktop/src-tauri) holds the remaining
        # Windows pipeline tests: the scrub-preview batch (#83/F08 — scaled
        # per-offset timeout and partial-result survival when a chunk stops
        # early), the tray pause/resume exposure (F22), and the system-suspend
        # pause/resume-all-families teardown. Scoped by test-name filter to those
        # modules: the full mnema suite still carries pre-existing Unix-path test
        # failures tracked by #77, so a broad `cargo test -p mnema` is deferred
        # until that lands; the filter below runs only the windows-pipeline tests,
        # which are green. The ML/native link these need was already built by the
        # "Build desktop crate" step above (cargo test reuses that artifact).
        run: >
          cargo test --locked -p mnema --lib --
          app_infra::frame_preview
          status_bar::tests
          native_capture::tests::windows_system_suspend
