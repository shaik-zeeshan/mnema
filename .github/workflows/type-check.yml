name: Type Check

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: type-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Full repo type check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # licensegate is a PRIVATE git dependency (apps/desktop/src-tauri/Cargo.toml,
      # fetched with the git CLI per .cargo/config.toml [net]); the workspace
      # cargo check below resolves it. Same LICENSEGATE_TOKEN secret as
      # macos-release.yml.
      - name: Configure git auth for private licensegate dependency
        run: git config --global url."https://x-access-token:${{ secrets.LICENSEGATE_TOKEN }}@github.com/shaik-zeeshan/licensegate".insteadOf "https://github.com/shaik-zeeshan/licensegate"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      # speakrs links OpenBLAS via the `openblas-static` feature: openblas-src
      # builds OpenBLAS (incl. Fortran LAPACK) from source during `cargo check`,
      # and the desktop build.rs force-links the static gfortran/quadmath runtime.
      # The shared script installs gcc and makes an unversioned `gfortran`
      # resolvable on PATH (+ FC/OPENBLAS_FC/LIBRARY_PATH) — the hosted runner's
      # keg exposes only `gfortran-15`, which otherwise breaks every literal
      # `gfortran` consumer. See scripts/ci-install-fortran.sh.
      - name: Install Fortran toolchain (gcc/gfortran)
        run: ./scripts/ci-install-fortran.sh

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Prepare Mnema CLI sidecar
        run: ./scripts/prepare-mnema-cli-sidecar.sh debug --locked

      # tauri.conf.json bundles apps/desktop/THIRD_PARTY_LICENSES.md, a
      # gitignored build output generated only at release time
      # (scripts/generate-third-party-licenses.sh). The Tauri build script
      # validates that every declared bundle resource exists even under
      # `cargo check`, so stub a placeholder here to keep type-check fast
      # (no cargo-about install / dep-graph resolve needed for a check).
      - name: Stub third-party licenses resource
        run: printf 'Placeholder for type-check only; real file is generated at release.\n' > apps/desktop/THIRD_PARTY_LICENSES.md

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --locked

      - name: Run semantic-search descriptor drift guard
        run: cargo test -p semantic-search --locked
