# RETIRED TO MANUAL-ONLY: the combined `release.yml` now owns the `v*` tag
# trigger and builds both macOS and Windows. This workflow is kept as a manual
# fallback (workflow_dispatch only) until `release.yml` is proven on a preview
# tag; delete it (see docs/release-process.md operator runbook) once that passes.
name: macOS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build, for example 0.3.0 or v0.3.0-preview.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build draft arm64 macOS release
    runs-on: macos-15
    environment: macos-release

    env:
      APPLE_SIGNING_IDENTITY: "-"
      CI: true
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Build OpenBLAS with all-generation arm64 kernels + runtime dispatch, so a
      # release built on one Apple Silicon generation (whatever the runner is)
      # runs on every other (M1–M4). Without this, the static OpenBLAS is tuned to
      # the build machine's exact core and can hit illegal-instruction crashes on
      # older CPUs.
      OPENBLAS_DYNAMIC_ARCH: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin

      # speakrs links OpenBLAS via the `openblas-static` feature: openblas-src
      # builds OpenBLAS (incl. Fortran LAPACK) from source, and the desktop
      # build.rs force-links the static gfortran/quadmath runtime. The shared
      # script installs gcc and makes an unversioned `gfortran` resolvable on
      # PATH (+ FC/OPENBLAS_FC/LIBRARY_PATH) — the hosted runner's keg exposes
      # only `gfortran-15`, which otherwise breaks every literal `gfortran`
      # consumer. See scripts/ci-install-fortran.sh.
      - name: Install Fortran toolchain (gcc/gfortran)
        run: ./scripts/ci-install-fortran.sh

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Verify release version
        id: release_version
        run: ./scripts/verify-desktop-release-version.sh "${{ github.event.inputs.version || github.ref_name }}"

      - name: Derive release channel
        id: release_channel
        run: |
          set -euo pipefail
          version="${{ steps.release_version.outputs.version }}"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "release version must be stable X.Y.Z or preview X.Y.Z-preview.N; got $version" >&2
            exit 1
          fi

      - name: Check frontend
        run: bun run check

      - name: Generate third-party license attribution
        run: ./scripts/generate-third-party-licenses.sh

      - name: Prepare Mnema CLI sidecar for Tauri check
        run: bun scripts/prepare-mnema-cli-sidecar.mjs debug --locked

      - name: Check Tauri Rust app
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
          CI: true
        with:
          projectPath: apps/desktop
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.release_version.outputs.tag }}
          releaseName: Mnema v${{ steps.release_version.outputs.version }}
          releaseDraft: true
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          generateReleaseNotes: true
          includeUpdaterJson: true

      - name: Stage release artifacts
        id: stage_artifacts
        run: ./scripts/stage-macos-release-artifacts.sh target/aarch64-apple-darwin/release/bundle dist/macos-release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnema-macos-arm64-${{ steps.release_version.outputs.version }}
          path: dist/macos-release/*
          if-no-files-found: error
