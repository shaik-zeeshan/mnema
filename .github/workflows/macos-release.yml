name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build, for example 0.3.0 or v0.3.0-preview.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build draft arm64 macOS release
    runs-on: macos-15
    environment: macos-release

    env:
      APPLE_SIGNING_IDENTITY: "-"
      CI: true
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Build OpenBLAS with all-generation arm64 kernels + runtime dispatch, so a
      # release built on one Apple Silicon generation (whatever the runner is)
      # runs on every other (M1–M4). Without this, the static OpenBLAS is tuned to
      # the build machine's exact core and can hit illegal-instruction crashes on
      # older CPUs.
      OPENBLAS_DYNAMIC_ARCH: "1"
      # CRL endpoint (ADR 0052), single source for both the baked const
      # (option_env! MNEMA_CRL_URL in crl_refresh.rs) and the baked floor
      # (bake-crl.ts's CRL_ENDPOINT below). Set repo variable CRL_URL to the
      # seller-owned custom domain; falls back to the dev workers.dev deploy.
      MNEMA_CRL_URL: ${{ vars.CRL_URL || 'https://mnema-fulfillment.shaikzeeshan999.workers.dev/revocations.json' }}
      # Activation endpoint (ADR 0053), baked via option_env! MNEMA_ACTIVATION_URL
      # in licensing.rs. Same pattern as CRL_URL: set repo variable ACTIVATION_URL
      # to the seller-owned domain; falls back to the dev workers.dev deploy.
      MNEMA_ACTIVATION_URL: ${{ vars.ACTIVATION_URL || 'https://mnema-fulfillment.shaikzeeshan999.workers.dev/activate' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin

      # speakrs links OpenBLAS via the `openblas-static` feature: openblas-src
      # builds OpenBLAS (incl. Fortran LAPACK) from source, and the desktop
      # build.rs force-links the static gfortran/quadmath runtime. The shared
      # script installs gcc and makes an unversioned `gfortran` resolvable on
      # PATH (+ FC/OPENBLAS_FC/LIBRARY_PATH) — the hosted runner's keg exposes
      # only `gfortran-15`, which otherwise breaks every literal `gfortran`
      # consumer. See scripts/ci-install-fortran.sh.
      - name: Install Fortran toolchain (gcc/gfortran)
        run: ./scripts/ci-install-fortran.sh

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Verify release version
        id: release_version
        run: ./scripts/verify-desktop-release-version.sh "${{ github.event.inputs.version || github.ref_name }}"

      - name: Derive release channel
        id: release_channel
        run: |
          set -euo pipefail
          version="${{ steps.release_version.outputs.version }}"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "release version must be stable X.Y.Z or preview X.Y.Z-preview.N; got $version" >&2
            exit 1
          fi

      - name: Check frontend
        run: bun run check

      - name: Generate third-party license attribution
        run: ./scripts/generate-third-party-licenses.sh

      # PLAN slice 6 — bake the live signed CRL over the committed placeholder so
      # shipped builds carry a real revocation floor (crates/app-infra/revocations.json
      # is include_str!'d at compile time). The script fetches /revocations.json and
      # verifies its Ed25519 signature against the production public key; a non-2xx,
      # unparseable, or bad-signature response exits non-zero and fails the release
      # loudly (no continue-on-error). Runs before the cargo check + Tauri build below
      # so both embed the freshly-baked floor. fulfillment is standalone (not in the
      # root workspace), so install its deps here. CRL_ENDPOINT overridable for dry-runs.
      - name: Bake live CRL into revocations.json
        working-directory: services/fulfillment
        env:
          CRL_ENDPOINT: ${{ env.MNEMA_CRL_URL }}
        run: |
          bun install --frozen-lockfile
          bun scripts/bake-crl.ts

      - name: Prepare Mnema CLI sidecar for Tauri check
        run: ./scripts/prepare-mnema-cli-sidecar.sh debug --locked

      - name: Check Tauri Rust app
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
          CI: true
        with:
          projectPath: apps/desktop
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.release_version.outputs.tag }}
          releaseName: Mnema v${{ steps.release_version.outputs.version }}
          releaseDraft: true
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          generateReleaseNotes: true
          includeUpdaterJson: true

      - name: Stage release artifacts
        id: stage_artifacts
        run: ./scripts/stage-macos-release-artifacts.sh target/aarch64-apple-darwin/release/bundle dist/macos-release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnema-macos-arm64-${{ steps.release_version.outputs.version }}
          path: dist/macos-release/*
          if-no-files-found: error
