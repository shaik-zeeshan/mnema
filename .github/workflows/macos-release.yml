name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build, for example 0.3.0 or v0.3.0-preview.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build draft arm64 macOS release
    runs-on: macos-15
    environment: macos-release

    env:
      # Developer ID signing (ADR 0057): the shared keychain group only works
      # on a Developer ID build with the provisioning profile embedded and the
      # CLI packaged as a helper bundle — see scripts/entitle-macos-app.sh.
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CI: true
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Build OpenBLAS with all-generation arm64 kernels + runtime dispatch, so a
      # release built on one Apple Silicon generation (whatever the runner is)
      # runs on every other (M1–M4). Without this, the static OpenBLAS is tuned to
      # the build machine's exact core and can hit illegal-instruction crashes on
      # older CPUs.
      OPENBLAS_DYNAMIC_ARCH: "1"
      # Buy-button checkout links, baked into the frontend bundle by Vite
      # (apps/desktop/src/lib/licensing.ts). Set repo variables
      # LICENSE_CHECKOUT_URL / RENEWAL_CHECKOUT_URL to the LIVE Polar links
      # before a real release; unset arrives as "" and the code (`||`) falls
      # back to the sandbox defaults.
      VITE_LICENSE_CHECKOUT_URL: ${{ vars.LICENSE_CHECKOUT_URL }}
      VITE_RENEWAL_CHECKOUT_URL: ${{ vars.RENEWAL_CHECKOUT_URL }}
      # Prod licensing config baked at compile time (option_env! in
      # licensing/adapter.rs). Unset falls back to an all-zero placeholder key
      # that verifies NOTHING — a release built without these ships a dead
      # license gate that rejects every real key. Set repo variables
      # LICENSE_PUBLIC_KEY / LICENSE_KID / LICENSE_PK_TOKEN from the licensegate
      # console before a real release (verifying/publishable values, not secrets).
      MNEMA_LICENSE_PUBLIC_KEY: ${{ vars.LICENSE_PUBLIC_KEY }}
      MNEMA_LICENSE_KID: ${{ vars.LICENSE_KID }}
      MNEMA_LICENSE_PK_TOKEN: ${{ vars.LICENSE_PK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json', 'apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin

      # speakrs links OpenBLAS via the `openblas-static` feature: openblas-src
      # builds OpenBLAS (incl. Fortran LAPACK) from source, and the desktop
      # build.rs force-links the static gfortran/quadmath runtime. The shared
      # script installs gcc and makes an unversioned `gfortran` resolvable on
      # PATH (+ FC/OPENBLAS_FC/LIBRARY_PATH) — the hosted runner's keg exposes
      # only `gfortran-15`, which otherwise breaks every literal `gfortran`
      # consumer. See scripts/ci-install-fortran.sh.
      - name: Install Fortran toolchain (gcc/gfortran)
        run: ./scripts/ci-install-fortran.sh

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock', 'apps/desktop/src-tauri/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Verify release version
        id: release_version
        run: ./scripts/verify-desktop-release-version.sh "${{ github.event.inputs.version || github.ref_name }}"

      - name: Derive release channel
        id: release_channel
        run: |
          set -euo pipefail
          version="${{ steps.release_version.outputs.version }}"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "release version must be stable X.Y.Z or preview X.Y.Z-preview.N; got $version" >&2
            exit 1
          fi

      # A stable release built without the licensing repo variables silently
      # bakes the all-zero placeholder key (dead gate) and sandbox checkout
      # links — fail loudly instead. Prereleases stay placeholder-friendly.
      - name: Require licensing config for stable releases
        if: steps.release_channel.outputs.channel == 'stable'
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${MNEMA_LICENSE_PUBLIC_KEY}" ]] || missing+=(LICENSE_PUBLIC_KEY)
          [[ -n "${MNEMA_LICENSE_KID}" ]] || missing+=(LICENSE_KID)
          [[ -n "${MNEMA_LICENSE_PK_TOKEN}" ]] || missing+=(LICENSE_PK_TOKEN)
          [[ -n "${VITE_LICENSE_CHECKOUT_URL}" ]] || missing+=(LICENSE_CHECKOUT_URL)
          [[ -n "${VITE_RENEWAL_CHECKOUT_URL}" ]] || missing+=(RENEWAL_CHECKOUT_URL)
          if (( ${#missing[@]} )); then
            echo "stable release requires repo variables: ${missing[*]} (Settings → Secrets and variables → Actions → Variables)" >&2
            exit 1
          fi

      - name: Check frontend
        run: bun run check

      - name: Generate third-party license attribution
        run: ./scripts/generate-third-party-licenses.sh

      # Fresh-install CRL floor: fetch the live prod CRL and export the signed
      # wire as MNEMA_CRL_FLOOR (option_env! in crl_refresh.rs) for the cargo
      # check + Tauri build below. A release must never ship floorless, so any
      # fetch failure (non-2xx, empty, not a payload.signature wire) fails the
      # release loudly — no continue-on-error. The binary re-verifies the
      # wire's Ed25519 signature at runtime before trusting it.
      - name: Fetch live CRL floor
        run: |
          set -euo pipefail
          wire="$(curl --fail --silent --show-error https://license.mnema.day/v1/crl/mnema)"
          if [[ -z "$wire" || "$wire" != *.* ]]; then
            echo "fetched CRL floor is empty or not a signed wire: '$wire'" >&2
            exit 1
          fi
          echo "MNEMA_CRL_FLOOR=$wire" >> "$GITHUB_ENV"

      - name: Prepare Mnema CLI sidecar for Tauri check
        run: ./scripts/prepare-mnema-cli-sidecar.sh debug --locked

      - name: Check Tauri Rust app
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # The Tauri CLI imports the certificate into a temporary keychain and
          # signs with it. Notarization env vars are deliberately NOT set here:
          # the bundles get repackaged below, which would void a notarization
          # done at build time — we notarize the final artifacts ourselves.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CI: true
        with:
          projectPath: apps/desktop
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.release_version.outputs.tag }}
          releaseName: Mnema v${{ steps.release_version.outputs.version }}
          releaseDraft: true
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          generateReleaseNotes: true
          includeUpdaterJson: true

      # Profile embed + helper-bundle CLI + re-sign (ADR 0057). This changes
      # the .app AFTER tauri-action built and uploaded the DMG/updater
      # artifacts, so everything downstream is rebuilt from the entitled app
      # and re-uploaded over the stale draft-release assets.
      - name: Entitle app (profile + helper-bundle CLI) and re-sign
        run: ./scripts/entitle-macos-app.sh target/aarch64-apple-darwin/release/bundle/macos/mnema.app "$APPLE_SIGNING_IDENTITY"

      - name: Notarize and staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -euo pipefail
          app="target/aarch64-apple-darwin/release/bundle/macos/mnema.app"
          ditto -c -k --keepParent "$app" mnema-notarize.zip
          xcrun notarytool submit mnema-notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id RJYMY4RR97 --wait
          xcrun stapler staple "$app"
          rm mnema-notarize.zip

      # The DMG and updater tar.gz built by tauri-action embed the pre-entitled
      # app — rebuild both from the stapled app. The updater archive must be
      # re-signed with the Tauri updater key (latest.json carries that
      # signature), and latest.json patched to match.
      - name: Rebuild DMG and updater archive from entitled app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bundle="target/aarch64-apple-darwin/release/bundle"
          app="$bundle/macos/mnema.app"
          tar_gz="$(ls "$bundle"/macos/*.app.tar.gz)"
          tar -czf "$tar_gz" -C "$bundle/macos" mnema.app
          bun run tauri -- signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$tar_gz"
          dmg="$(ls "$bundle"/dmg/*.dmg)"
          staging="$(mktemp -d)"
          ditto "$app" "$staging/mnema.app"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "mnema" -srcfolder "$staging" -ov -format UDZO "$dmg"
          rm -rf "$staging"

      - name: Replace stale draft release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bundle="target/aarch64-apple-darwin/release/bundle"
          tag="${{ steps.release_version.outputs.tag }}"
          sig="$(cat "$bundle"/macos/*.app.tar.gz.sig)"
          gh release download "$tag" --pattern latest.json --output "$bundle/latest.json"
          jq --arg sig "$sig" '.platforms["darwin-aarch64"].signature = $sig' \
            "$bundle/latest.json" > "$bundle/latest.json.tmp"
          mv "$bundle/latest.json.tmp" "$bundle/latest.json"
          gh release upload "$tag" \
            "$bundle/latest.json" \
            "$bundle"/dmg/*.dmg \
            "$bundle"/macos/*.app.tar.gz \
            "$bundle"/macos/*.app.tar.gz.sig \
            --clobber

      - name: Stage release artifacts
        id: stage_artifacts
        run: ./scripts/stage-macos-release-artifacts.sh target/aarch64-apple-darwin/release/bundle dist/macos-release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnema-macos-arm64-${{ steps.release_version.outputs.version }}
          path: dist/macos-release/*
          if-no-files-found: error
